<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TRADESCAN V2.7</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050910;
      --bg-elevated: #0b111b;
      --bg-soft: #0f1724;
      --border-subtle: #1b2535;
      --accent: #00ff88;
      --accent-soft: rgba(0, 255, 136, 0.12);
      --accent-strong: rgba(0, 255, 136, 0.35);
      --accent-amber: #ffb800;
      --accent-amber-soft: rgba(255, 184, 0, 0.12);
      --accent-amber-strong: rgba(255, 184, 0, 0.35);
      --text: #e5edf7;
      --muted: #6b7a90;
      --danger: #ff4b6a;
      --danger-soft: rgba(255, 75, 106, 0.12);
      --danger-strong: rgba(255, 75, 106, 0.35);
      --grid-header: #111827;
      --row-hover: rgba(15, 23, 42, 0.9);
      --row-alt: rgba(15, 23, 42, 0.6);
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --shadow-soft: 0 18px 45px rgba(0, 0, 0, 0.75);
      --shadow-subtle: 0 0 0 1px rgba(15, 23, 42, 0.9);
      --pill-bg: rgba(15, 23, 42, 0.9);
      --pill-border: rgba(148, 163, 184, 0.35);
      --pill-active-bg: rgba(15, 118, 110, 0.35);
      --pill-active-border: rgba(45, 212, 191, 0.85);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
      color: var(--text);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2.5rem 1.5rem 3rem;
      color: var(--text);
    }

    .shell {
      width: 100%;
      max-width: 1320px;
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.08), transparent 55%),
                  radial-gradient(circle at top right, rgba(45, 212, 191, 0.08), transparent 55%),
                  linear-gradient(145deg, #020617 0%, #020617 40%, #020617 100%);
      border-radius: 1.75rem;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(15, 23, 42, 0.95);
      position: relative;
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 0 0, rgba(59, 130, 246, 0.18), transparent 55%),
        radial-gradient(circle at 100% 0, rgba(34, 197, 94, 0.18), transparent 55%);
      mix-blend-mode: soft-light;
      opacity: 0.7;
      pointer-events: none;
    }

    .shell-inner {
      position: relative;
      z-index: 1;
      padding: 1.75rem 1.75rem 2rem;
    }

    header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .app-title {
      font-size: 1.4rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #e5edf7;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .app-title span.badge {
      font-size: 0.7rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: radial-gradient(circle at top, rgba(148, 163, 184, 0.18), transparent 60%);
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .app-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.25rem;
      font-family: var(--font-mono);
    }

    .clock-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .clock-label {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.7rem;
      color: var(--muted);
    }

    #clock {
      font-size: 0.9rem;
      color: #e5edf7;
    }

    #st-date {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .market-status {
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.18rem 0.6rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }

    .status-open {
      border-color: var(--accent-strong);
      background: rgba(5, 46, 22, 0.9);
      color: var(--accent);
    }

    .status-closed {
      border-color: rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .search-wrap {
      flex: 1 1 260px;
      max-width: 420px;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 0.55rem 0.75rem 0.55rem 2.1rem;
      border-radius: 999px;
      border: 1px solid rgba(30, 64, 175, 0.9);
      background: radial-gradient(circle at top left, rgba(30, 64, 175, 0.35), transparent 60%),
                  rgba(15, 23, 42, 0.96);
      color: var(--text);
      font-size: 0.85rem;
      font-family: var(--font-sans);
      outline: none;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.9);
    }

    .search-input::placeholder {
      color: rgba(148, 163, 184, 0.7);
    }

    .search-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: rgba(148, 163, 184, 0.9);
      pointer-events: none;
    }

    .toolbar-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pill-btn {
      border-radius: 999px;
      border: 1px solid var(--pill-border);
      background: var(--pill-bg);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 0.35rem 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.16s ease-out;
    }

    .pill-btn span.icon {
      font-size: 0.9rem;
    }

    .pill-btn:hover {
      border-color: rgba(148, 163, 184, 0.9);
      color: #e5edf7;
      background: rgba(15, 23, 42, 1);
    }

    .pill-btn.primary {
      border-color: var(--accent-strong);
      background: rgba(5, 46, 22, 0.9);
      color: var(--accent);
    }

    .pill-btn.danger {
      border-color: var(--danger-strong);
      background: rgba(76, 5, 25, 0.9);
      color: var(--danger);
    }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.1rem;
    }

    .filter-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-right: 0.4rem;
    }

    .filter-btn {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
      font-size: 0.72rem;
      padding: 0.25rem 0.65rem;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      cursor: pointer;
      font-family: var(--font-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.16s ease-out;
    }

    .filter-btn .dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.7);
    }

    .filter-btn.active {
      border-color: var(--pill-active-border);
      background: var(--pill-active-bg);
      color: #e5edf7;
    }

    .filter-btn.active .dot {
      background: var(--accent);
    }

    .filter-btn:hover {
      border-color: rgba(148, 163, 184, 0.9);
      color: #e5edf7;
    }

    .grid-shell {
      border-radius: 1.25rem;
      overflow: hidden;
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.98));
      box-shadow: var(--shadow-subtle);
      border: 1px solid rgba(15, 23, 42, 0.95);
    }

    .grid-header {
      display: grid;
      grid-template-columns: 0.9fr 2.2fr 1.1fr 1.4fr 1fr 1.2fr 1.1fr 0.9fr 0.9fr;
      gap: 0;
      padding: 0.55rem 0.9rem;
      background: linear-gradient(to right, #020617, #020617);
      border-bottom: 1px solid rgba(30, 64, 175, 0.9);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .grid-header div {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      white-space: nowrap;
    }

    .grid-header div span.hint {
      font-size: 0.65rem;
      color: rgba(148, 163, 184, 0.8);
    }

    .grid-body {
      max-height: 620px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(51, 65, 85, 0.9) transparent;
    }

    .grid-body::-webkit-scrollbar {
      width: 6px;
    }

    .grid-body::-webkit-scrollbar-track {
      background: transparent;
    }

    .grid-body::-webkit-scrollbar-thumb {
      background: rgba(51, 65, 85, 0.9);
      border-radius: 999px;
    }

    .ticker-row {
      display: grid;
      grid-template-columns: 0.9fr 2.2fr 1.1fr 1.4fr 1fr 1.2fr 1.1fr 0.9fr 0.9fr;
      gap: 0;
      padding: 0.5rem 0.9rem;
      font-size: 0.8rem;
      align-items: center;
      border-bottom: 1px solid rgba(15, 23, 42, 0.9);
      background: rgba(15, 23, 42, 0.9);
      transition: background 0.12s ease-out, transform 0.08s ease-out;
      animation: fadeInUp 260ms ease-out both;
    }

    .ticker-row:nth-child(even) {
      background: var(--row-alt);
    }

    .ticker-row:hover {
      background: var(--row-hover);
      transform: translateY(-1px);
    }

    .cell-ticker {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: #e5edf7;
    }

    .cell-name {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      color: #e5edf7;
      font-size: 0.8rem;
    }

    .sector-tag {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 0.12rem 0.4rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: var(--muted);
      background: rgba(15, 23, 42, 0.9);
      font-family: var(--font-mono);
    }

    .sector-tag.green {
      border-color: var(--accent-strong);
      color: var(--accent);
      background: rgba(5, 46, 22, 0.9);
    }

    .sector-tag.blue {
      border-color: rgba(59, 130, 246, 0.7);
      color: rgba(129, 199, 255, 0.95);
      background: rgba(15, 23, 42, 0.9);
    }

    .sector-tag.gold {
      border-color: var(--accent-amber-strong);
      color: var(--accent-amber);
      background: rgba(45, 29, 0, 0.9);
    }

    .cell-price {
      font-family: var(--font-mono);
      color: #e5edf7;
    }

    .cell-52wk {
      font-family: var(--font-mono);
      color: var(--muted);
      font-size: 0.78rem;
    }

    .cell-yield {
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .cell-mktcap {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
    }

    .cell-rating {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .rating-badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.16rem 0.45rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
    }

    .r-A {
      border-color: var(--accent-strong);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .r-B {
      border-color: rgba(56, 189, 248, 0.7);
      background: rgba(15, 23, 42, 0.9);
      color: rgba(129, 199, 255, 0.95);
    }

    .r-C {
      border-color: var(--accent-amber-strong);
      background: var(--accent-amber-soft);
      color: var(--accent-amber);
    }

    .r-D {
      border-color: var(--danger-strong);
      background: var(--danger-soft);
      color: var(--danger);
    }

    .r-N {
      border-color: rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
      color: var(--muted);
    }

    .cell-stb {
      display: flex;
      align-items: center;
      justify-content: flex-start;
    }

    .stb-link {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: rgba(129, 199, 255, 0.95);
      text-decoration: none;
      padding: 0.16rem 0.4rem;
      border-radius: 999px;
      border: 1px solid rgba(59, 130, 246, 0.7);
      background: rgba(15, 23, 42, 0.9);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stb-link:hover {
      background: rgba(30, 64, 175, 0.9);
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 0.9rem;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .footer-row span strong {
      color: #e5edf7;
      font-weight: 500;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 960px) {
      .grid-header,
      .ticker-row {
        grid-template-columns: 1.1fr 2.4fr 1.2fr 1.4fr 1.1fr 1.2fr 1.1fr 0.9fr 0.9fr;
      }
    }

    @media (max-width: 820px) {
      body {
        padding: 1.5rem 0.75rem 2rem;
      }
      .shell-inner {
        padding: 1.4rem 1.2rem 1.6rem;
      }
      .title-row {
        flex-direction: column;
        align-items: flex-start;
      }
      .status-block {
        align-items: flex-start;
      }
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      .toolbar-buttons {
        justify-content: flex-start;
      }
      .grid-header,
      .ticker-row {
        grid-template-columns: 1.1fr 2.4fr 1.2fr 1.4fr 1.1fr 1.2fr 1.1fr 0.9fr 0.9fr;
      }
    }

    @media (max-width: 720px) {
      .grid-header,
      .ticker-row {
        grid-template-columns: 1.1fr 2.4fr 1.2fr 1.4fr 1.1fr 1.2fr;
      }
      .cell-mktcap,
      .cell-rating:nth-of-type(2),
      .cell-stb {
        display: none;
      }
    }

    @media (max-width: 540px) {
      .grid-header,
      .ticker-row {
        grid-template-columns: 1.1fr 2.4fr 1.2fr 1.4fr;
      }
      .cell-52wk,
      .cell-mktcap,
      .cell-rating:nth-of-type(2),
      .cell-stb {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="shell-inner">
      <header>
        <div class="title-row">
          <div class="title-block">
            <div class="app-title">
              TRADESCAN
              <span class="badge">V2.7</span>
            </div>
            <div class="app-subtitle">
              Top 25 Wealth &amp; Income Increase Portfolio
            </div>
          </div>
          <div class="status-block">
            <div class="clock-row">
              <span class="clock-label">System Time</span>
              <span id="clock">--:--:--</span>
              <span id="st-date">---</span>
            </div>
            <div id="market-status" class="market-status status-closed">
              ○ MARKET CLOSED
            </div>
          </div>
        </div>

        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input
              id="search"
              class="search-input"
              type="text"
              placeholder="Search tickers or names…"
              oninput="filterRows()"
            />
          </div>
          <div class="toolbar-buttons">
            <button class="pill-btn primary" onclick="openAllYahoo()">
              <span class="icon">↗</span>
              YAHOO
            </button>
            <button class="pill-btn" onclick="openAllFinviz()">
              <span class="icon">↗</span>
              FINVIZ
            </button>
            <button class="pill-btn danger" onclick="loadLivePrices()">
              <span class="icon">⟳</span>
              REFRESH PRICES
            </button>
          </div>
        </div>

        <div class="filter-bar">
          <span class="filter-label">Sector Filter</span>
          <button class="filter-btn active" onclick="setFilter('all', this)">
            <span class="dot"></span> All
          </button>
          <button class="filter-btn" onclick="setFilter('Energy', this)">
            <span class="dot"></span> Energy
          </button>
          <button class="filter-btn" onclick="setFilter('Financials', this)">
            <span class="dot"></span> Financials
          </button>
          <button class="filter-btn" onclick="setFilter('Tech', this)">
            <span class="dot"></span> Tech
          </button>
          <button class="filter-btn" onclick="setFilter('REIT', this)">
            <span class="dot"></span> REIT
          </button>
          <button class="filter-btn" onclick="setFilter('Other', this)">
            <span class="dot"></span> Other
          </button>
        </div>
      </header>

      <div class="grid-shell">
        <div class="grid-header">
          <div>Ticker</div>
          <div>Name / Sector</div>
          <div>Last</div>
          <div>52W Range</div>
          <div>Yield</div>
          <div>Market Cap</div>
          <div>Analyst</div>
          <div>STB</div>
          <div>Link</div>
        </div>
        <div id="ticker-grid" class="grid-body"></div>
      </div>

      <div class="footer-row">
        <span>Showing <strong id="st-count">0</strong> symbols</span>
        <span>Data: Live prices via Twelve Data · STB &amp; Analyst ratings for signal confirmation</span>
      </div>
    </div>
  </div>

  <script>
    const TWELVEDATA_API_KEY = 'YOUR_TWELVEDATA_API_KEY_HERE';

    const tickers = [
      // Example structure; replace with your real data
      // { t: 'XOM', n: 'Exxon Mobil Corp.', s: 'Energy', tag: 'green', price: 120.12, lo: 95.10, hi: 123.45, div: '3.4%', cap: '480B', analyst: 'Buy', stb: 'A' },
    ];

    let activeFilter = 'all';

    function gradeClass(g) {
      if (!g || g === 'N/R') return 'r-N';
      const c = g[0];
      if (c === 'A') return 'r-A';
      if (c === 'B') return 'r-B';
      if (c === 'C') return 'r-C';
      if (c === 'D') return 'r-D';
      return 'r-N';
    }

    function yieldColor(d) {
      if (!d || d === '—') return 'color:var(--muted)';
      const v = parseFloat(d);
      if (v >= 8) return 'color:var(--green)';
      if (v >= 4) return 'color:var(--amber)';
      return 'color:var(--text)';
    }

    function fmtPrice(v) {
      if (v >= 100) return v.toFixed(2);
      if (v >= 1) return v.toFixed(2);
      return v.toFixed(4).replace(/0+$/, '').replace(/\.$/, '');
    }

    function renderGrid(data) {
      const grid = document.getElementById('ticker-grid');
      grid.innerHTML = '';

      if (!data || data.length === 0) {
        grid.innerHTML =
          '<div style="text-align:center;padding:3rem;font-family:var(--font-mono);color:var(--muted);">No tickers match filter.</div>';
        document.getElementById('st-count').textContent = 0;
        return;
      }

      data.forEach((d, i) => {
        const row = document.createElement('div');
        row.className = 'ticker-row';
        row.dataset.sector = d.s;
        row.style.animationDelay = (i * 30) + 'ms';

        row.innerHTML = `
          <div class="cell-ticker">${d.t}</div>
          <div class="cell-name">
            ${d.n}
            <span class="sector-tag ${d.tag || ''}">${d.s}</span>
          </div>
          <div class="cell-price" id="price-${d.t}">$${fmtPrice(d.price)}</div>
          <div class="cell-52wk">$${d.lo}–$${d.hi}</div>
          <div class="cell-yield" style="${yieldColor(d.div)}">${d.div}</div>
          <div class="cell-mktcap">${d.cap}</div>
          <div class="cell-rating">
            <span class="rating-badge ${gradeClass(
              d.analyst === 'Buy' ? 'B' :
              d.analyst === 'Hold' ? 'C' : 'N'
            )}" style="${
              d.analyst === 'Buy'
                ? 'color:var(--accent);border-color:rgba(0,255,136,0.3);background:rgba(0,255,136,0.07)'
                : d.analyst === 'Hold'
                ? 'color:var(--accent-amber);border-color:rgba(255,184,0,0.3);background:rgba(255,184,0,0.07)'
                : 'color:var(--muted);border-color:rgba(74,96,112,0.3);background:rgba(74,96,112,0.05)'
            }">${d.analyst}</span>
          </div>
          <div class="cell-rating">
            <span class="rating-badge ${gradeClass(d.stb)}">${d.stb}</span>
          </div>
          <div class="cell-stb">
            <a class="stb-link" href="https://swingtradebot.com/equities/${d.t}" target="_blank" rel="noopener">STB ↗</a>
          </div>
        `;

        grid.appendChild(row);
      });

      document.getElementById('st-count').textContent = data.length;
    }

    function filterRows() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      let data = tickers.slice();

      if (activeFilter !== 'all') {
        data = data.filter(d => d.s === activeFilter);
      }

      if (q) {
        data = data.filter(d =>
          d.t.toLowerCase().includes(q) ||
          d.n.toLowerCase().includes(q)
        );
      }

      renderGrid(data);
    }

    function setFilter(sector, btn) {
      activeFilter = sector;
      document.querySelectorAll('.filter-btn').forEach(b =>
        b.classList.remove('active')
      );
      btn.classList.add('active');
      filterRows();
    }

    function openAllYahoo() {
      tickers.forEach((d, i) => {
        setTimeout(() =>
          window.open(`https://finance.yahoo.com/quote/${d.t}`, '_blank', 'noopener'),
          i * 120
        );
      });
    }

    function openAllFinviz() {
      tickers.forEach((d, i) => {
        setTimeout(() =>
          window.open(`https://finviz.com/quote.ashx?t=${d.t}`, '_blank', 'noopener'),
          i * 120
        );
      });
    }

    async function fetchLivePrice(symbol) {
      const url = `https://api.twelvedata.com/price?symbol=${encodeURIComponent(symbol)}&apikey=${TWELVEDATA_API_KEY}`;
      const res = await fetch(url);
      const data = await res.json();
      if (data && data.price) return parseFloat(data.price);
      throw new Error(data?.message || `No price returned for ${symbol}`);
    }

    async function loadLivePrices() {
      const targets = tickers.filter(x =>
        x.t !== 'EUR' &&
        x.t !== 'RZLV' &&
        x.t !== 'ASTI' &&
        x.t !== 'ATAI' &&
        x.t !== 'WRND'
      );

      await Promise.allSettled(
        targets.map(async d => {
          try {
            const p = await fetchLivePrice(d.t);
            if (!Number.isNaN(p)) d.price = p;
          } catch (e) {
            console.warn(d.t, e.message);
          }
        })
      );

      filterRows();
    }

    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        hour12: true,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('clock').textContent = timeStr;

      const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
      const day = et.getDay();
      const h = et.getHours(), m = et.getMinutes();
      const mins = h * 60 + m;
      const isWeekday = day >= 1 && day <= 5;
      const isOpen = isWeekday && mins >= 570 && mins < 960;

      const el = document.getElementById('market-status');
      el.style.color = '';

      if (isOpen) {
        el.textContent = '● NYSE OPEN';
        el.className = 'market-status status-open';
      } else if (isWeekday && mins >= 540 && mins < 570) {
        el.textContent = '◉ PRE-MARKET';
        el.className = 'market-status status-open';
        el.style.color = 'var(--accent-amber)';
      } else if (isWeekday && mins >= 960 && mins < 1200) {
        el.textContent = '◎ AFTER-HOURS';
        el.className = 'market-status status-open';
        el.style.color = 'var(--accent-amber)';
      } else {
        el.textContent = '○ MARKET CLOSED';
        el.className = 'market-status status-closed';
      }

      document.getElementById('st-date').textContent = now.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric'
      });
    }

    setInterval(updateClock, 1000);
    updateClock();
    renderGrid(tickers);
    loadLivePrices();
  </script>
</body>
</html>
